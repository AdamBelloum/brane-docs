name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch uses the old naming

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # --- OPTIONAL BUILD STEP ---
      # If you use a static site generator, add your build commands here.
      # Example for Node:
      # - name: Install and Build
      #   run: |
      #     npm ci
      #     npm run build
      # ----------------------------

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point this to your static files. 
          # Use "." if your index.html is in the root, or "dist"/"build" if you use a builder.
          path: "." 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
